<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Feedback Wall</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
    <main>
		<div id="title">
			<h1>Feedback Wall</h1>
			<div id="new-post">
				<a href="/new">
					<button class="btn">New Post</button>
				</a>
			</div>
		</div>
        <hr/>
        <div class="container">
			<div th:each="post : ${posts}" class="post-card">
				<a th:href="@{/{id}(id=${post.id})}">
					<h1 th:text="${post.title}"></h1>
					<hr/>
					<p th:text="${post.createdAt}"></p>
					<hr/>
					<div class="small-container">
						<span th:text="${post.views}"></span>
						<span th:text="${post.likeCount}"></span>
						<span th:text="${post.dislikeCount}"></span>
					</div>
				</a>
			</div>
		</div>
    </main>
</body>
</html>
